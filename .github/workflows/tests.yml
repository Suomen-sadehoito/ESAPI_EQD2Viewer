name: Unit Tests

on:
  push:
    branches: [ master, main, develop, feature/standalone-devrunner ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    runs-on: windows-latest
    env:
      CI: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore EQD2Viewer.sln

    - name: Build solution
      run: msbuild EQD2Viewer.sln /p:Configuration=Debug /p:Platform="Any CPU" /t:Build /verbosity:minimal

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Run unit tests and integration tests
      run: |
        dotnet test EQD2Viewer.Tests\EQD2Viewer.Tests.csproj --no-build --configuration Debug --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results (Unit + Integration)
        path: TestResults/*.trx
        reporter: dotnet-trx